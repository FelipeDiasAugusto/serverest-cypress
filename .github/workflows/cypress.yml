name: Cypress Automation

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  cypress-tests:
    name: Cypress Web and API Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Display environment versions
        run: |
          node --version
          npm --version

      - name: Install dependencies and run Cypress tests
        uses: cypress-io/github-action@v7
        with:
          install-command: npm ci
          command: npm run test:report

      - name: Upload Mochawesome report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report-${{ github.run_number }}
          path: cypress/reports/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ github.run_number }}
          path: cypress/screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Cypress videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-${{ github.run_number }}
          path: cypress/videos/
          if-no-files-found: ignore
          retention-days: 7